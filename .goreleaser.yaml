version: 2

project_name: crossmem

builds:
  - id: crossmem
    main: ./cmd/crossmem
    binary: crossmem
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/muthuishere/crossmemcli/internal/version.Version={{ .Version }} -X github.com/muthuishere/crossmemcli/internal/version.Commit={{ .Commit }} -X github.com/muthuishere/crossmemcli/internal/version.Date={{ .Date }}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    hooks:
      post:
        - sh -c 'mkdir -p npm/platforms/{{ .Os }}-{{ if eq .Arch "amd64" }}x64{{ else }}{{ .Arch }}{{ end }}/bin'
        - sh -c 'cp "{{ .Path }}" "npm/platforms/{{ .Os }}-{{ if eq .Arch "amd64" }}x64{{ else }}{{ .Arch }}{{ end }}/bin/{{ if eq .Os "windows" }}crossmem.exe{{ else }}crossmem{{ end }}"'

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

homebrew_casks:
  - name: crossmem
    binaries:
      - crossmem
    repository:
      owner: muthuishere
      name: homebrew-tap
    homepage: https://github.com/muthuishere/crossmemcli
    description: Portable context memory across local agent tools.
    license: MIT
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/crossmem"]
          end

release:
  github:
    owner: muthuishere
    name: crossmemcli
